// ── Animated Counter ───────────────────────────────────────────────────────────
function Counter({ target, suffix="", prefix="" }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const done = useRef(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !done.current) {
        done.current = true;
        const end = parseInt(target);
        const steps = 60;
        let i = 0;
        const t = setInterval(() => {
          i++;
          setVal(Math.round((end * i) / steps));
          if (i >= steps) clearInterval(t);
        }, 30);
      }
    }, { threshold: 0.4 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [target]);
  return <span ref={ref}>{prefix}{val}{suffix}</span>;
}

// ── Progress Bar ───────────────────────────────────────────────────────────────
function ProgressBar({ value, color, delay=0 }) {
  const ref = useRef(null);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && ref.current) {
        setTimeout(() => {
          if (ref.current) ref.current.style.width = value + "%";
        }, delay);
      }
    }, { threshold: 0.3 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [value, delay]);
  return (
    <div className="bar-track">
      <div ref={ref} className="bar-fill" style={{ background: color, "--bar-w": value+"%" }} />
    </div>
  );
}

function Wizard() {

  const [done, setDone] = useState(false);

// ── Magnetic Button ────────────────────────────────────────────────────────────
function MagBtn({ onClick }) {
  const ref = useRef(null);
  const move = (e) => {
    if (!ref.current) return;
    const r = ref.current.getBoundingClientRect();
    const dx = e.clientX - (r.left + r.width/2);
    const dy = e.clientY - (r.top + r.height/2);
    ref.current.style.transform = `translate(${dx*0.25}px,${dy*0.25}px) scale(1.08)`;
  };
  const leave = () => { if (ref.current) ref.current.style.transform = "translate(0,0) scale(1)"; };
  return (
    <button ref={ref} onClick={onClick} onMouseMove={move} onMouseLeave={leave} className="mag-btn pulse-glow"
      style={{position:"fixed",bottom:"6rem",right:"1.25rem",zIndex:400,width:"52px",height:"52px",borderRadius:"50%",border:"none",cursor:"pointer",background:"linear-gradient(135deg,#7c3aed,#2563eb)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 8px 25px rgba(124,58,237,0.5)"}}>
      <Ico.Chat style={{width:"22px",height:"22px",color:"#fff"}} />
    </button>
  );
}

            </span>
          </button>
          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
            <button onClick={() => setHc(!hc)}
              style={{display:"flex",alignItems:"center",gap:"6px",padding:"5px 12px",borderRadius:"10px",border:`1px solid ${hc?"#fbbf24":"#e2e8f0"}`,background:hc?"#fef3c7":"#f8fafc",cursor:"pointer",fontSize:"0.72rem",fontWeight:700,color:hc?"#92400e":"#64748b",transition:"all 0.25s"}}>
              {hc ? <Ico.Sun style={{width:"14px",height:"14px"}} /> : <Ico.Moon style={{width:"14px",height:"14px"}} />}
              <span style={{display:"none"}} id="hc-label">{hc?"Normal":"Alto Contraste"}</span>
              <span>{hc ? "Normal" : "Contraste"}</span>
            </button>
            <a href="tel:5547622143" className="btn-navy" style={{padding:"6px 14px",fontSize:"0.75rem",display:"flex",alignItems:"center",gap:"5px",textDecoration:"none"}}>
              <Ico.Phone style={{width:"13px",height:"13px"}} />
              <span>55 4762 2143</span>
            </a>
          </div>
        </div>
      </header>

      {/* Content */}
      <div key={key} className="slide-up">
        <Section />
      </div>

      <Footer />
      <Dock active={tab} setActive={navigate} />
      <MagBtn onClick={() => navigate("contacto")} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
